<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>

  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      margin:0;
    }

    header{
      background:black;
      color:white;
      text-align:center;
      padding:20px;
    }

    .productos{
      display:flex;
      justify-content:center;
      gap:20px;
      padding:40px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      width:250px;
      padding:20px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    .precio{
      color:green;
      font-size:22px;
    }
  </style>
</head>

<body>

<header>
  <h1>Nuestras Zapatillas</h1>
</header>

<section class="productos">

  <div class="card">
    <img src="imagenes/Black Cat .jpg">
    <h2>Jordan retro 4 Black Cat</h2>
    <p class="precio">429€</p>
  </div>

  <div class="card">
    <img src="imagenes/GUCCI .jpg">
    <h2>Gucci</h2>
    <p class="precio">1050€</p>
  </div>

  <div class="card">
    <img src="imagenes/Forum .jpg">
    <h2>Adida forum x bad bunny</h2>
    <p class="precio">400€</p>
  </div>

  <div class="card">
    <img src="Nike x Supreme .jpg">
    <h2>Nike zoom x supreme</h2>
    <p class="precio">520€</p>
  </div>

  <div class="card">
    <img src="SALOMON-SPEEDCROSS-6-W .jpg">
    <h2>Salomon speedcross</h2>
    <p class="precio">170€</p>
  </div>

  <div class="card">
    <img src="zapatillas-bullpadel-neuron-vibram-25i-negro .jpg">
    <h2>Bullpadel neuron vibram 2</h2>
    <p class="precio">130€</p>
  </div>

  <div class="card">
    <img src="Zapatos elegantes .jpeg">
    <h2>Alexander McQueen</h2>
    <p class="precio">745€</p>
  </div>

  <div class="card">
    <img src="Nike Speed zoom .jpeg">
    <h2>Nike Speed zoom</h2>
    <p class="precio">120€</p>
  </div>

  <div class="card">
    <img src="Asics .jpg">
    <h2>Asics Sport</h2>
    <p class="precio">110€</p>
  </div>

  <div class="card">
    <img src="Nike Phantom .jpg">
    <h2>Botas de Futbol Nike Phantom</h2>
    <p class="precio">100€</p>
  </div>

</section>

</body>
</html>
