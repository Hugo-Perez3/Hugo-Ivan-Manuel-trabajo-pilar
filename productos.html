<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>

  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      margin:0;
    }

    header{
      background:black;
      color:white;
      text-align:center;
      padding:20px;
    }

    .productos{
      display:flex;
      justify-content:center;
      gap:20px;
      padding:40px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      width:250px;
      padding:20px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    .precio{
      color:green;
      font-size:22px;
    }
  </style>
</head>

<body>

<header>
  <h1>Nuestras Zapatillas</h1>
</header>

<section class="productos">

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Nike Air Max</h2>
    <p class="precio">79€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Adidas Run</h2>
    <p class="precio">69€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Puma Street</h2>
    <p class="precio">59€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Reebok Classic</h2>
    <p class="precio">74€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Converse Urban</h2>
    <p class="precio">65€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>New Balance 550</h2>
    <p class="precio">89€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Vans Old Skool</h2>
    <p class="precio">62€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Jordan Retro</h2>
    <p class="precio">120€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Asics Sport</h2>
    <p class="precio">72€</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h2>Skechers Flex</h2>
    <p class="precio">58€</p>
  </div>

</section>

</body>
</html>
