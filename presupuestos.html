<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Presupuestos</title>

  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
    }

    form{
      width:400px;
      margin:50px auto;
      background:white;
      padding:30px;
      border-radius:10px;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:20px;
    }

    button{
      background:black;
      color:white;
      padding:10px 20px;
      border:none;
    }
  </style>
</head>

<body>

<form>
  <h1>Solicitar Presupuesto</h1>

  <input type="text" placeholder="Nombre">

  <input type="email" placeholder="Correo electrónico">

  <textarea placeholder="Escribe tu pedido"></textarea>

  <button>Enviar</button>
</form>

</body>
</html>
